<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بازی نجات جنگل 🌳</title>

<style>
body{
  font-family:tahoma;
  background: linear-gradient(to top, #0f2027, #2c7744);
  color:white;
  text-align:center;
}

#game{
  max-width:600px;
  margin:auto;
  padding:20px;
}

.card{
  background:#ffffff22;
  padding:20px;
  border-radius:20px;
  margin-top:20px;
}

button{
  display:block;
  width:80%;
  margin:10px auto;
  padding:10px;
  font-size:18px;
  border-radius:12px;
  border:none;
}

.choice{background:#4caf50;color:white;}

#footer{
  margin-top:20px;
  font-size:14px;
}

#forest{
  font-size:40px;
  margin:10px;
}
</style>
</head>

<body>

<div id="game">

<h1>🌳 بازی نجات جنگل</h1>

<div id="forest">🌳🌳🌳🌳🌳</div>

<div class="card">

<h2 id="q">شروع بازی</h2>

<div id="choices"></div>

<button onclick="nextQ()">سوال بعدی 🚀</button>

</div>

<div id="footer">
طرح: الهام طلوعی
</div>

</div>

<script>

let score=0,life=3,a,b,ans;

function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

function nextQ(){

a=Math.floor(Math.random()*8)+2;
b=Math.floor(Math.random()*8)+2;
ans=a*b;

document.getElementById("q").textContent=
a+" × "+b+" = ؟";

let opts=[ans,ans+1,ans-1,ans+2];
opts=shuffle(opts);

let c=document.getElementById("choices");
c.innerHTML="";

opts.forEach(v=>{
  let bt=document.createElement("button");
  bt.className="choice";
  bt.textContent=v;
  bt.onclick=()=>check(v);
  c.appendChild(bt);
});

}

function check(v){

if(v===ans){
  score+=10;
  alert("آفرین! جنگل نجات پیدا کرد 🌿");
}
else{
  life--;
  alert("او نه! یک درخت از بین رفت ❌");
}

document.getElementById("forest").textContent =
"🌳".repeat(life) + "🌲".repeat(5-life);

if(life<=0){
  alert("بازی تمام شد 😢 جنگل از بین رفت");
}

nextQ();
}

nextQ();

</script>

</body>
</html>
