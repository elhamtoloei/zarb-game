<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ماموریت ضرب در فضا</title>
<style>
body{font-family:tahoma;background:linear-gradient(#08132b,#1d3b6d);color:#fff;text-align:center;margin:0}
#game{max-width:700px;margin:auto;padding:20px}
.card{background:#ffffff22;border-radius:16px;padding:20px}
button{font-size:20px;padding:10px 18px;border:none;border-radius:12px;cursor:pointer}
.choice{display:block;width:220px;margin:10px auto}
#footer{margin-top:20px;font-size:14px}
</style>
</head>
<body>
<div id="game">
<h1>🚀 ماموریت ضرب در فضا</h1>
<div class="card">
<p>امتیاز: <span id="score">0</span> ⭐ | جان: <span id="life">3</span> ❤️</p>
<h2 id="q">برای شروع روی دکمه بزن.</h2>
<div id="choices"></div>
<button onclick="nextQ()">شروع بازی</button>
</div>
<div id="footer">طراح: الهام طلوعی</div>
</div>
<script>
let score=0,life=3,a,b,ans;
function shuffle(arr){return arr.sort(()=>Math.random()-0.5);}
function nextQ(){
 if(life<=0){document.getElementById('q').innerHTML="🎉 پایان بازی<br>امتیاز: "+score;document.getElementById('choices').innerHTML="";return;}
 a=Math.floor(Math.random()*8)+2;
 b=Math.floor(Math.random()*8)+2;
 ans=a*b;
 document.getElementById('q').textContent=`${a} × ${b} = ؟`;
 let opts=[ans,ans+1,ans-1,ans+2];
 opts=shuffle(opts);
 let c=document.getElementById('choices'); c.innerHTML="";
 opts.forEach(v=>{
   let bt=document.createElement("button");
   bt.className="choice";
   bt.textContent=v;
   bt.onclick=()=>check(v);
   c.appendChild(bt);
 });
}
function check(v){
 if(v===ans){score+=10;alert("آفرین! ⭐");}
 else{life--;alert("دوباره تلاش کن!");}
 document.getElementById("score").textContent=score;
 document.getElementById("life").textContent=life;
 nextQ();
}
</script>
</body>
</html>
