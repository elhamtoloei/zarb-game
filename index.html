<!DOCTYPE html><html lang="fa" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>قهرمان سبز ایران</title><style>body{margin:0;font-family:tahoma;background:linear-gradient(#87ceeb,#dff7ff 45%,#5fbf5f 46%,#2e8b57);display:flex;justify-content:center;align-items:center;height:100vh}.card{background:#ffffffdd;padding:25px;border-radius:18px;max-width:650px;text-align:center}button{background:#16a34a;color:#fff;border:0;padding:12px 24px;border-radius:10px}input{width:80%;padding:10px}#story{display:none}</style></head><body><div class="card"><div id="home"><h1>🌳 قهرمان سبز ایران</h1><h3>سفر به شهرهای ایران با ضرب</h3><p>با حل کردن سؤال‌های ضرب، جنگل‌های ایران را نجات بده.</p><input id="name" placeholder="نام دانش‌آموز"><br><br><button onclick="start()">شروع سفر</button><p>طراح: الهام طلوعی</p></div><div id="story"><h2>داستان بازی</h2><p id="t"></p><button onclick="alert('مرحله دوم: نقشه ایران')">بله، آماده‌ام</button></div></div><script>function start(){let n=document.getElementById("name").value||"دوست خوبم";home.style.display="none";story.style.display="block";t.innerHTML="سلام "+n+"، جنگل‌های ایران در خطر هستند. با پاسخ درست به سؤال‌های ضرب، اولین سفر خود را به جنگل‌های هیرکانی گلستان آغاز می‌کنی."}</script></body></html>
